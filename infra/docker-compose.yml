version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: reportcanvas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reportcanvas_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: reportcanvas-azurite
    restart: unless-stopped
    command: >
      azurite
      --blobHost 0.0.0.0
      --blobPort 10000
      --queueHost 0.0.0.0
      --queuePort 10001
      --tableHost 0.0.0.0
      --tablePort 10002
      --loose
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azurite_data:/data

volumes:
  postgres_data:
  azurite_data:
